// ============================================================
// HOW MODS WORK IN SOF2 (id Tech 3 / Quake 3 Engine)
// ============================================================
//
// - All game content lives in .pk3 files (renamed ZIP archives)
//   inside base\ or a named mod folder.
//
// - The engine loads ALL .pk3s from the active folder in
//   alphabetical order. Later letters override earlier ones.
//   e.g. zz_mypatch.pk3 overrides aabase.pk3
//
// - To create a mod, make a subfolder next to base\
//   (e.g. mymod\) and put your .pk3 files there.
//
// - Launch the mod with a shortcut:
//   SoF2.exe +set fs_game mymod
//
// - The active mod folder stacks on top of base\ - if a file
//   isn't in the mod folder, the engine falls back to base\.
//
// - autoexec.cfg in the mod folder runs first on startup.
//
// - vm_game 0, vm_cgame 0, vm_ui 0 = use native DLLs
//   (gamex86.dll, cgamex86.dll, Menusx86.dll)
//   vm_game 2 = use compiled QVM bytecode (mods can ship .qvm)


// ============================================================
// PK3 FILE STRUCTURE (what goes where inside the zip)
// ============================================================
//
// models\           - .md3 / .mdr (SOF2 skeletal) model files
// models\weapons\   - weapon models
// models\players\   - player/enemy skins + .skin files
// textures\         - TGA/JPG texture files
// shaders\          - .shader text files (material definitions)
// sounds\           - .wav / .mp3 sound files
// music\            - background music tracks
// scripts\          - weapon .wpn scripts, NPC .npc files, etc.
// cgame\            - cgame QVM (cgamex86.qvm)
// game\             - game logic QVM (gamex86.qvm)
// ui\               - UI QVM + menu scripts
// maps\             - .bsp compiled map files
// maps\scripts\     - .script entity scripts for maps
// gfx\              - 2D graphics / HUD elements
// fonts\            - custom fonts


// ============================================================
// WEAPON SCRIPT FILES (.wpn) - key for weapon modding
// ============================================================
//
// Located in: pk3\scripts\  (or base\scripts\ unpacked)
// One .wpn file per weapon, plain text, editable.
// Controls: damage, range, refire rate, spread, magazine size,
//           zoom, fire modes, animations, sounds, FX.
//
// Key weapon script fields (approximate):
//   damage          <n>     - damage per hit
//   range           <n>     - effective range
//   spread          <n>     - bullet spread/accuracy
//   clipSize        <n>     - magazine size
//   maxAmmo         <n>     - max ammo carried
//   reloadTime      <n>     - reload animation length
//   fireTime        <n>     - delay between shots (ms)
//   zoomFov         <n>     - FOV when zoomed/aiming
//   altFireType     <n>     - secondary fire type
//   dismemberment   <n>     - gore/dismemberment bonus
//
// To edit: extract the scripts\ folder from a pk3,
//          edit the .wpn files, re-zip as a new pk3
//          named with zz_ prefix so it loads last.


// ============================================================
// SHADER FILES - key for texture/FX modding
// ============================================================
//
// Located in: pk3\shaders\  plain text files
// Shader = material definition: controls how a surface renders
// Can add glow, transparency, scrolling effects, decal layers etc.
// Shaders are referenced by name from model/BSP surfaces.


// ============================================================
// TOOLS YOU NEED
// ============================================================
//
// PK3 / Archive:
//   - Any zip tool (7-Zip, WinRAR) - just rename .zip to .pk3
//   - PakScape (GUI pk3 browser/editor) - search ModDB
//   - Dragon UnPACKer - extract pk3 contents
//
// Map Editor:
//   - GtkRadiant 1.5 or 1.6 (id Tech 3 compatible)
//     https://icculus.org/gtkradiant/
//   - Updated SOF2 entity definitions for GTKRadiant:
//     https://www.nexusmods.com/soldieroffortune2/mods/3771
//
// Model tools:
//   - Md3View - view .md3 models  
//   - Blender with io_scene_md3 plugin for importing/exporting
//   - Milkshape 3D - classic Q3 modding tool
//
// Source / SDK:
//   - Raven released parts of the SOF2 source alongside id Tech 3
//   - id Tech 3 (Quake 3) source is on GitHub (id-Software/Quake-III-Arena)
//   - SOF2 SDK may be available via Raven's releases or community archives
//   - Compile with MSVC or MinGW to produce gamex86.dll etc.
//
// Memory patches / fixes:
//   - Sui's Fix (winmm.dll injector - widescreen, FOV, borderless)
//     https://github.com/SuiMachine/Soldier-of-Fortune-2-SuisFix/releases


