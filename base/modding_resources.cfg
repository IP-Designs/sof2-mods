// ============================================================
// KNOWN ENGINE LIMITS / HARDCODED VALUES
// ============================================================
//
// - Body/corpse count: HARDCODED in gamex86.dll - cannot be
//   changed via cfg. The engine removes old bodies when limit hit.
//   Requires source-level DLL mod to change.
//
// - Decal/mark count: ~1000 marks max, recycled in FIFO order.
//   cg_marktime controls lifetime but not the hard cap.
//
// - fx_countScale max: 1.0 (above this causes crashes in heavy scenes)
//
// - Max FPS cap: effectively ~91 FPS in SP. Going higher
//   causes physics/movement bugs (character gets stuck).
//   Set com_maxfps 85 for safe play.
//
// - Max clients: 64 in MP
//
// - File system: pk3s loaded alphabetically, last-letter wins.
//   Use zz_ prefix on override pk3s.


// ============================================================
// QUICK MOD SETUP STEPS
// ============================================================
//
// 1. Create folder: <game root>\mymod\
// 2. Create: <game root>\mymod\autoexec.cfg  (mod settings)
// 3. Put .pk3 files inside mymod\
// 4. Launch: SoF2.exe +set fs_game mymod
//    OR add to shortcut target after the exe path
//
// For DLL mods (game logic changes):
// 1. Set vm_game 0, vm_cgame 0, vm_ui 0 in autoexec.cfg
// 2. Set com_blindlyloaddlls 1
// 3. Place modified gamex86.dll / cgamex86.dll in mod folder
//
// For config-only mods (what we're doing now):
// - Just edit autoexec.cfg and/or drop override pk3s in base\
// - No DLL or VM needed


