// ============================================================
// Soldier of Fortune 2 - Double Helix
// Console Commands & CVARs Reference
// Load in-game with:  exec commands_reference.cfg
// Open console with:  ~ or `
// ============================================================


// ============================================================
// MOVEMENT COMMANDS (bind these to keys)
// ============================================================
// +forward          Move forward
// +back             Move backward
// +moveleft         Strafe left
// +moveright        Strafe right
// +left             Turn left
// +right            Turn right
// +speed            Walk (hold for slow movement)
// +moveup           Jump
// +movedown         Crouch (toggle)
// +prone            Go prone
// +higher           Stand up from crouch/prone
// +lower            Lower stance (crouch/prone)
// +leanleft         Lean left around cover
// +leanright        Lean right around cover
// +lookup           Look up
// +lookdown         Look down
// centerview        Center view (pitch)


// ============================================================
// COMBAT & WEAPON COMMANDS
// ============================================================
// +attack           Primary fire
// +altattack        Alternate fire / aim down sights
// +reload           Reload current weapon
// +firemode         Cycle fire mode (semi/auto/burst)
// weapnext          Select next weapon
// weapprev          Select previous weapon
// throwwpn          Throw current weapon
// throwselwpn       Throw selected weapon
// inventory0-9      Select weapon slot 0-9
// wpn_switching 0   All weapons available
// wpn_switching 1   Next weapon mode
// wpn_switching 2   Previous weapon mode
// wpn_switching 3   Cycle weapon switching
// +control1         Weapon control 1 (e.g. grenade cook)
// +control2         Weapon control 2
// +use              Use / interact


// ============================================================
// PLAYER / GAME COMMANDS
// ============================================================
// kill              Suicide / respawn
// god               God mode (cheat - requires sv_cheats 1)
// noclip            No clip / fly through walls (cheat)
// notarget          Enemies ignore you (cheat)
// give all          Give all weapons & ammo (cheat)
// give ammo         Give ammo (cheat)
// give health       Give health (cheat)
// give armor        Give armor (cheat)
// give <item>       Give specific item (cheat)


// ============================================================
// SINGLE PLAYER MAP / LEVEL COMMANDS
// ============================================================
// spmap <mapname>   Load a single-player map
// devmap <mapname>  Load map with cheats enabled
// map <mapname>     Load a map (MP)
// changelevel <map> Change to next level
// quicksave         Quick save
// quickload         Quick load
// menu save2        Open save menu
// menu load2        Open load menu
// menu objective    Show objectives
// menu keys         Key bindings menu
// menu video        Video settings menu
// menu audio        Audio settings menu
// menu misc         Misc settings menu
// menu scale        HUD scale menu
// pause             Pause the game
// rmg_automap       Toggle automap (RMG missions)


// ============================================================
// MULTIPLAYER COMMANDS
// ============================================================
// connect <ip:port> Connect to a server
// disconnect        Disconnect from server
// reconnect         Reconnect to last server
// status            Show current server/player info
// serverinfo        Show server info/CVARs
// userinfo          Show your user info
// say <text>        Chat to everyone
// say_team <text>   Chat to team only
// callvote <cmd>    Call a vote
// vote yes          Vote yes
// vote no           Vote no
// +scores           Hold to show scoreboard
// ready             Mark yourself as ready


// ============================================================
// DEMO / SCREENSHOT
// ============================================================
// record <name>     Start recording a demo
// stoprecord        Stop recording
// demo <name>       Play back a demo
// timedemo <demo>   Benchmark with a demo
// screenshot        Take a TGA screenshot
// screenshotJPEG    Take a JPEG screenshot
// r_screenshot      Screenshot (bound to F11 by default)


// ============================================================
// CONSOLE / CONFIG COMMANDS
// ============================================================
// toggleconsole     Open/close the console (~ key)
// exec <file.cfg>   Execute a config file from base/
// bind <key> <cmd>  Bind a key to a command
// unbind <key>      Remove a key binding
// unbindall         Remove all bindings
// set <cvar> <val>  Set a CVAR
// seta <cvar> <val> Set a CVAR and save it to config
// sets <cvar> <val> Set a server info CVAR
// setu <cvar> <val> Set a user info CVAR
// toggle <cvar>     Toggle a boolean CVAR
// vstr <cvar>       Execute the contents of a CVAR as a command
// echo <text>       Print text to console
// wait              Wait one frame before next command
// condump <file>    Dump console output to file
// cvar_list         List all CVARs and current values
// cmdlist           List all available commands
// reset <cvar>      Reset CVAR to default
// quit              Quit the game


// ============================================================
// NET / SERVER COMMANDS
// ============================================================
// net_restart       Restart network subsystem
// sv_restart        Restart server
// map_restart       Restart current map
// kick <player>     Kick a player (server admin)
// kickban <player>  Kick and ban a player
// clientkick <id>   Kick by client number


// ============================================================
// RENDERER CVARs  (use seta to save)
// ============================================================
// r_fullscreen 0|1              Fullscreen toggle
// r_mode -1                     Video mode (-1 = custom)
// r_customwidth 1920            Custom resolution width
// r_customheight 1080           Custom resolution height
// r_customaspect 1              Use custom aspect ratio
// r_colorbits 0|16|32           Color depth (0=desktop)
// r_depthbits 0|16|24           Depth buffer bits
// r_stencilbits 0|8             Stencil buffer bits
// r_gamma 1.0                   Gamma correction (0.5-3.0)
// r_overBrightBits 0|1|2        Overbright lighting
// r_ignorehwgamma 0|1           Ignore hardware gamma
// r_picmip 0-3                  Texture mipmap level (0=best)
// r_textureMode <mode>          GL_LINEAR_MIPMAP_LINEAR etc.
// r_ext_anisotropic_level 1-16  Anisotropic filtering
// r_detailtextures 0|1          Detail textures
// r_dynamiclight 0|1            Dynamic lights
// r_flares 0|1|2                Lens flares
// r_fastsky 0|1                 Fast sky rendering
// r_drawfog 0|1                 Fog rendering
// r_weather 0|1                 Weather effects
// r_subdivisions 4              Curve tessellation (lower=smoother)
// r_lodbias 0                   Level of detail bias
// r_lodCurveError 250           LOD curve error
// r_animSmooth 0.5              Animation smoothing
// r_facePlaneCull 0|1           Face plane culling
// r_finish 0|1                  Force GL finish (may help sync)
// r_swapInterval 0|1            VSync (0=off, 1=on)
// r_primitives 0                Rendering primitive mode
// r_aliasShaders 0|1            Alias shaders
// r_nomipmip 0|1                Disable mipmap for mipmapped textures
// r_MipMaps 0|1                 Enable mipmaps
// r_allowExtensions 0|1         Allow all GL extensions
// r_allowATIExtensions 0|1      ATI-specific extensions
// r_allowNvidiaExtensions 0|1   Nvidia-specific extensions
// r_allowWglExtensions 0|1      WGL extensions (Windows)
// r_ext_compiled_vertex_array 0|1  CVA extension
// r_ext_multitexture 0|1        Multitexture extension
// r_ext_texture_env_add 0|1     Texture env add extension
// r_weEffectFog 0|1             Weather effect fog
// r_ssCheap 0|1                 Cheap screenshots
// r_imagePersistence 0|1        Keep images in memory
// r_uma 0|1                     Unified memory architecture
// r_videoCard <name>            Video card profile
// r_ihv <name>                  IHV profile (Nvidia/ATI)
// r_flushLightmaps 0|1          Flush lightmaps on load
// r_maxTextureSize 0            Max texture size (0=unlimited)
// r_minpicmip 0                 Minimum picmip
// vid_restart                   Apply video settings changes
// vid_xpos 0                    Window X position


// ============================================================
// SOUND CVARs
// ============================================================
// s_volume 0.7          Master volume (0.0-1.0)
// s_musicvolume 0.5     Music volume (0.0-1.0)
// s_khz 11|22|44        Sound sample rate
// s_mixahead 0.2        Sound mix ahead time
// s_mixPreStep 0.05     Mix pre-step
// s_allowDynamicMusic 0|1  Dynamic music system
// s_mp3overhead <n>     MP3 overhead buffer
// snd_dll ds|openal     Sound driver (ds=DirectSound)
// snd_restart           Restart sound subsystem


// ============================================================
// CLIENT CVARs
// ============================================================
// cl_run 0|1            Auto-run toggle
// cl_sensitivity 5      Mouse sensitivity
// cl_mouseAccel 0.0     Mouse acceleration
// cl_freelook 0|1       Free mouse look
// cl_invert_x 0|1       Invert X axis
// cl_invert_y 0|1       Invert Y axis
// cl_yawspeed 140       Keyboard turn speed
// cl_pitchspeed 140     Keyboard look speed
// cl_packetdup 1        Duplicate packets (reduce loss)
// cl_blankFrames 20     Blank frames on connect
// cl_subtitles 0|1      In-game subtitles
// cl_touchmem 0|1       Touch memory on load


// ============================================================
// MOUSE CVARs
// ============================================================
// m_pitch 0.022         Mouse pitch scale
// m_forward 0.25        Mouse forward scale
// m_side 0.25           Mouse side scale
// m_filter 0|1          Mouse smoothing filter
// m_cursor_speed 8      Cursor speed (menus)
// m_cursor_accel 2      Cursor acceleration (menus)


// ============================================================
// GAME CVARs
// ============================================================
// g_forcecrouchjump 0|1  Force crouch to jump
// g_gravity 800          Gravity value
// g_speed 320            Player movement speed
// g_knockback 1000       Knockback force
// g_friendlyFire 0|1     Friendly fire (MP)
// g_weaponrespawn <n>    Weapon respawn time (MP)
// g_forcerespawn 0       Force respawn time (MP)
// g_maxGameClients 0     Max clients in game
// g_dmflags 0            Deathmatch flags
// g_fraglimit 20         Frag limit (MP)
// g_timelimit 0          Time limit in minutes (MP)
// g_inactivity 0         Inactivity kick timer (MP)
// g_log <file>           Log file for server
// g_logSync 0|1          Synchronous log writes


// ============================================================
// SERVER CVARs
// ============================================================
// sv_maxclients 8       Max clients on server
// sv_hostname <name>    Server name shown in browser
// sv_password <pw>      Server password
// sv_fps 20             Server frame rate
// sv_timeout 200        Client timeout in seconds
// sv_zombietime 2       Zombie connection time
// sv_allowDownload 0|1  Allow client downloads
// sv_cheats 0|1         Enable cheat commands
// sv_floodprotect 1     Flood chat protection
// sv_quicksave_index 0  Quick save slot index (SP)
// sv_restart            Restart server
// rconpassword <pw>     Remote console password
// rcon <cmd>            Execute remote console command


// ============================================================
// COMMON / SYSTEM CVARs
// ============================================================
// com_maxfps 85          Max FPS cap
// com_introplayed 0|1    Skip intro movies (0=show, 1=skip)
// com_blindlyloaddlls 1  Load DLLs without verification (needed for mods)
// sys_memory 2047        Memory allocation in MB
// sys_cpuspeed           Detected CPU speed (read-only)
// sys_noaltenter 0|1     Disable Alt+Enter fullscreen toggle
// fs_game <name>         Active mod folder (set at launch)
// fs_homepath            Home path for configs/saves
// fs_basepath            Base installation path


// ============================================================
// VM CVARs (required for mods using native DLLs)
// ============================================================
// vm_game 0|1|2          Game VM mode (0=native DLL, 2=QVM)
// vm_cgame 0|1|2         Cgame VM mode
// vm_ui 0|1|2            UI VM mode


// ============================================================
// CGAME (HUD/CLIENT GAME) CVARs
// ============================================================
// cg_drawCrosshair 0-9   Crosshair style (0=off)
// cg_drawFPS 0|1         Show FPS counter
// cg_drawTimer 0|1       Show match timer
// cg_drawAmmoWarning 0|1 Low ammo warning
// cg_drawAttacker 0|1    Show last attacker
// cg_fov 90              Field of view (degrees)
// cg_zoomFov 22.5        Zoomed FOV
// cg_bobup 0.005         View bob up amount
// cg_bobroll 0.002       View bob roll
// cg_runpitch 0.002      Run pitch bob
// cg_runroll 0.005       Run roll bob
// cg_shadows 1           Shadow rendering
// cg_marks 1             Bullet marks on walls
// cg_blood 1             Blood effects
// cg_gibs 1              Gibbing (dismemberment)
// cg_brassTime 2500      Shell casing lifetime (ms)
// cg_predictItems 1      Client-side item prediction (MP)
// cg_smoothClients 0|1   Smooth other player movement (MP)
// cg_teamChatHeight 8    Team chat lines shown
// cg_chatHeight 8        Chat lines shown
// cg_chatTime 3000       Chat display time (ms)
// cg_noProjectileTrail 0 Disable projectile trails
// cg_gun_x|y|z 0        Gun model offset
// fx_countScale 0.6      Particle/effect density scale


// ============================================================
// RMG (Random Map Generator) CVARs
// ============================================================
// rmg_mission <file.cfg>    Mission type config
// rmg_location <file.cfg>   Location/environment config
// rmg_timeofday <file.cfg>  Time of day config (night.cfg etc.)
// ar_seed_text <seed>        RMG seed string
// ar_usetimelimit yes|no     Use time limit in RMG
// ar_wpn <file.cfg>          Weapon set config


// ============================================================
// INPUT CVARs
// ============================================================
// in_mouse -1|0|1    Mouse mode (-1=DirectInput, 0=default, 1=raw)
// in_joystick 0|1    Joystick support
// in_midi 0|1        MIDI input
// in_mididevice 0    MIDI device index
// in_midichannel 1   MIDI channel
// in_midiport 1      MIDI port
// in_joyBallScale    Joystick ball scale
// joy_threshold 0.15 Joystick dead zone
// cursor_blink_speed 500  UI cursor blink rate (ms)


// ============================================================
// UI CVARs
// ============================================================
// ui_precache 0|1    Precache UI assets
// sp_language 0      Language select (SP)
// sp_debug 0|1       SP debug mode
// tip_millisecPerLine 250  Tip display speed
// cpu_lodbias -1     CPU LOD bias
// cpu_lowend 0|1     Low-end CPU mode
// card_lodbias 0     GPU LOD bias
// shatter 1          Shatter effects (glass etc.)
// ff_avail 0|1       Force feedback available
// ff_channels <cfg>  Force feedback channel config
// ff_delay 80        Force feedback delay (ms)


// ============================================================
// USEFUL QUICK COMMANDS - copy into console or exec
// ============================================================
// Skip all intro videos:
//   seta com_introplayed "1"
//
// Uncap FPS:
//   seta com_maxfps "0"
//
// Enable cheats on current map:
//   sv_cheats 1 ; map_restart
//
// Take a screenshot:
//   screenshotJPEG
//
// Dump all current CVARs to file:
//   cvar_list
//
// List all commands:
//   cmdlist
//
// Reload current map:
//   map_restart
//
// Load mod named "mymod" (run at launch or via fs_game):
//   +set fs_game mymod
//
// Enable native DLLs for modding:
//   seta vm_game "0"
//   seta vm_cgame "0"
//   seta vm_ui "0"
//   seta com_blindlyloaddlls "1"
